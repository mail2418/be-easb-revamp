apiVersion: 1

groups:
  - orgId: 1
    name: easb-backend
    folder: EASB Alerts
    interval: 1m
    rules:
      - uid: easb_backend_down
        title: Backend Down
        condition: C
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: EASB backend is unreachable
          description: Prometheus cannot scrape easb-backend for more than 2 minutes.
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job="easb-backend"}
              instant: true
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              type: reduce
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              expression: B
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
                  type: query

      - uid: easb_high_error_rate
        title: High Error Rate
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: EASB backend 5xx error rate above 5%
          description: More than 5% of HTTP requests returned 5xx over the last 5 minutes.
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(http_server_requests_total{job="easb-backend",status=~"5.."}[5m])) / sum(rate(http_server_requests_total{job="easb-backend"}[5m]))
              instant: true
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              type: reduce
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              expression: B
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
                  type: query

      - uid: easb_high_latency_p95
        title: High Latency P95
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: EASB backend p95 latency above 2s
          description: 95th percentile request latency exceeded 2 seconds for 5 minutes.
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{job="easb-backend"}[5m])))
              instant: true
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              type: reduce
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              expression: B
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
                  type: query
