worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        text/javascript;

    # Existing project (Kalsel / legacy)
    upstream backend {
        server easb-backend:3000;
        keepalive 32;
    }

    # Tulungagung revamp — container name from BACKEND_CONTAINER_NAME in .env.production
    upstream tulungagung_backend {
        server be-easb-tulungagung:3000;
        keepalive 32;
    }

    # Shared proxy headers/timeouts for backend locations.
    # (snippets included per-location below)

    # ─────────────────────────────────────────────────────────────
    # HTTP :80 — redirect everything to HTTPS (Kominfo/BSSN: TLS only).
    # Keeps the ACME http-01 challenge path open for Let's Encrypt renewals.
    # ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────
    # HTTPS :443 — TLS 1.2/1.3 termination.
    # Certificates are mounted at /etc/nginx/certs (see docker-compose.yml).
    #   fullchain.pem  — server cert + intermediate chain
    #   privkey.pem    — private key
    # On the PDN VM, provision these via Let's Encrypt/certbot or the
    # government-issued CA before bringing nginx up.
    # ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        client_max_body_size 50M;

        # Tulungagung API: https://<host>/tulungagung/api/v1/...
        # /tulungagung/health, /tulungagung/metrics also work
        location /tulungagung/ {
            proxy_pass         http://tulungagung_backend/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Default — existing Kalsel backend
        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
