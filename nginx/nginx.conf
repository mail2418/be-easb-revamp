worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        text/javascript;

    # Existing project (Kalsel / legacy)
    upstream backend {
        server easb-backend:3000;
        keepalive 32;
    }

    # Tulungagung revamp — container name from BACKEND_CONTAINER_NAME in .env.production
    upstream tulungagung_backend {
        server be-easb-tulungagung:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # Tulungagung API: http://<host>/tulungagung/api/v1/...
        # /tulungagung/health, /tulungagung/metrics also work
        location /tulungagung/ {
            proxy_pass         http://tulungagung_backend/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Default — existing Kalsel backend
        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
