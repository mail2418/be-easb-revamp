services:
  nginx:
    image: nginx:alpine
    container_name: easb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - easb-net

networks:
  easb-net:
    external: true
