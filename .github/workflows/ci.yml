name: Backend CI

on:
  pull_request:
    branches: [dev, main]
  workflow_call:

jobs:
  ci:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm test -- --passWithNoTests
