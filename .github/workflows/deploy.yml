name: Deploy Backend

on:
  push:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      image_name_lc: ${{ steps.lowercase.outputs.image_name_lc }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name for Docker/OCI
        id: lowercase
        run: echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name_lc }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.repository == 'mail2418/be-easb-revamp'
    environment: SSH deploy

    steps:
      - name: Validate and normalize deploy target
        id: vps
        env:
          VPS_HOST_RAW: ${{ secrets.VPS_HOST }}
          VPS_USER_RAW: ${{ secrets.VPS_USER }}
          VPS_PROJECT_PATH_RAW: ${{ secrets.VPS_PROJECT_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST_RAW:-}" ]; then
            echo "::error::VPS_HOST is empty. Add it to the 'SSH deploy' environment secrets."
            exit 1
          fi

          # Strip whitespace/newlines and common copy-paste mistakes (URL, user@, path, SSH port).
          HOST="$(printf '%s' "$VPS_HOST_RAW" | tr -d '[:space:]' | sed -E \
            's|^https?://||; s|^ssh://||; s|^[^@]+@||; s|/.*$||; s|:([0-9]{1,5})$||')"

          if printf '%s' "$HOST" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
            echo "VPS_HOST is a valid IPv4 address."
          elif printf '%s' "$HOST" | grep -Eq '^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$'; then
            if ! getent hosts "$HOST" >/dev/null 2>&1; then
              echo "::error::VPS_HOST hostname '$HOST' does not resolve from GitHub Actions."
              echo "::error::Use the Oracle Cloud public IP (e.g. 168.110.202.68) instead of an internal hostname."
              exit 1
            fi
            echo "VPS_HOST hostname resolves."
          else
            echo "::error::VPS_HOST is not a valid IP or hostname after normalization."
            echo "::error::Set VPS_HOST to the bare public IP, e.g. 168.110.202.68 (no https://, no user@, no path)."
            exit 1
          fi

          if [ -z "${VPS_USER_RAW:-}" ]; then
            echo "::error::VPS_USER is empty. Set it to 'ubuntu' in the 'SSH deploy' environment."
            exit 1
          fi
          USER="$(printf '%s' "$VPS_USER_RAW" | tr -d '[:space:]')"

          if [ -z "${VPS_PROJECT_PATH_RAW:-}" ]; then
            echo "::warning::VPS_PROJECT_PATH is empty; using default /home/ubuntu/Samarta-ASB-Tulungagung/be-easb-revamp"
            PROJECT_PATH="/home/ubuntu/Samarta-ASB-Tulungagung/be-easb-revamp"
          else
            PROJECT_PATH="$(printf '%s' "$VPS_PROJECT_PATH_RAW" | tr -d '[:space:]')"
          fi

          echo "Deploy project path: $PROJECT_PATH"

          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "user=$USER" >> "$GITHUB_OUTPUT"
          echo "project_path=$PROJECT_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name_lc }}:${{ github.ref_name }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          VPS_HEALTH_URL: ${{ secrets.VPS_HEALTH_URL }}
          VPS_PROJECT_PATH: ${{ steps.vps.outputs.project_path }}
        with:
          host: ${{ steps.vps.outputs.host }}
          username: ${{ steps.vps.outputs.user }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: BACKEND_IMAGE,GHCR_TOKEN,GHCR_USERNAME,VPS_HEALTH_URL,VPS_PROJECT_PATH
          script: |
            set -euo pipefail
            cd "$VPS_PROJECT_PATH"

            if [ ! -f .env.production ]; then
              echo "::error::.env.production not found in $VPS_PROJECT_PATH"
              echo "::error::Expected path: /home/ubuntu/Samarta-ASB-Tulungagung/be-easb-revamp — update VPS_PROJECT_PATH in GitHub 'SSH deploy' secrets."
              exit 1
            fi

            echo "Deploying from: $(pwd)"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$BACKEND_IMAGE"

            export BACKEND_IMAGE
            export ENV_FILE=.env.production
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production"

            # Ensure shared network exists without touching running infra containers.
            docker network inspect easb-net >/dev/null 2>&1 || docker network create easb-net

            # VPS already runs postgres (5433) and nginx (80/443) — start only if missing, never recreate.
            for svc in postgres nginx; do
              container="easb-${svc}"
              if docker ps -a --format '{{.Names}}' | grep -qx "$container"; then
                echo "Infra present: $container (leaving ports/config unchanged)"
                docker start "$container" 2>/dev/null || true
              else
                echo "Starting missing infra: $svc"
                $COMPOSE --profile "$svc" up -d --no-recreate
              fi
            done

            # Roll only the backend container with the new GHCR image.
            $COMPOSE --profile backend up -d --no-deps --pull never --force-recreate backend

            echo "Waiting for postgres..."
            until docker exec easb-postgres pg_isready -U "${POSTGRES_USER:-postgres}" -d "${POSTGRES_DB:-easb}" >/dev/null 2>&1; do
              sleep 2
            done

            echo "Waiting for backend to start..."
            sleep 10

            docker exec -i easb-backend \
              node ./node_modules/typeorm/cli.js -d dist/data_source.js migration:run

            if [ -n "$VPS_HEALTH_URL" ]; then
              curl -fsS "$VPS_HEALTH_URL/health" > /dev/null
              curl -fsS "$VPS_HEALTH_URL/health/ready" > /dev/null
            else
              docker exec easb-backend node -e "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
              docker exec easb-backend node -e "fetch('http://127.0.0.1:3000/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            fi

            echo "Backend deployment complete."
