name: Deploy Backend

on:
  push:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      image_name_lc: ${{ steps.lowercase.outputs.image_name_lc }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name for Docker/OCI
        id: lowercase
        run: echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name_lc }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.repository == 'mail2418/be-easb-revamp'
    environment: SSH deploy

    steps:
      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::error::VPS_HOST is empty. Add it to the 'SSH deploy' environment or repository secrets."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name_lc }}:${{ github.ref_name }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          VPS_HEALTH_URL: ${{ secrets.VPS_HEALTH_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: BACKEND_IMAGE,GHCR_TOKEN,GHCR_USERNAME,VPS_HEALTH_URL
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$BACKEND_IMAGE"

            export BACKEND_IMAGE
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production"

            # VPS already runs postgres + nginx on 80/443 — do not force-recreate infra (avoids port bind conflicts).
            $COMPOSE --profile postgres --profile nginx --profile observability up -d

            # Roll only the backend container with the new GHCR image.
            $COMPOSE --profile backend up -d --no-deps --force-recreate backend

            echo "Waiting for backend to start..."
            sleep 10

            docker exec -i easb-backend \
              node ./node_modules/typeorm/cli.js -d dist/data_source.js migration:run

            if [ -n "$VPS_HEALTH_URL" ]; then
              curl -fsS "$VPS_HEALTH_URL/health" > /dev/null
              curl -fsS "$VPS_HEALTH_URL/health/ready" > /dev/null
            else
              docker exec easb-backend node -e "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
              docker exec easb-backend node -e "fetch('http://127.0.0.1:3000/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            fi

            echo "Backend deployment complete."
