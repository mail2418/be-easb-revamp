name: Build, Push & Deploy

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Job 1: Build & Push image to GHCR ──────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name_lc: ${{ steps.lowercase.outputs.image_name_lc }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase repository name for Docker/OCI
        id: lowercase
        run: echo "image_name_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name_lc }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy to VPS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name_lc }}:dev
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: BACKEND_IMAGE,GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            # Authenticate with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            # Pull the latest image
            docker pull "$BACKEND_IMAGE"

            # Restart backend service with new image
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -f docker-compose.backend.easb.yml up -d --force-recreate

            # Wait for the container to be ready
            echo "Waiting for backend to start..."
            sleep 5

            # Run database migrations
            docker exec -T easb-backend \
              node ./node_modules/typeorm/cli.js -d dist/data_source.js migration:run

            echo "Deployment complete."
