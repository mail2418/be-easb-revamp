services:
  postgres:
    image: postgres:16-alpine
    container_name: easb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-easb}
    volumes:
      - easb_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - easb-net

volumes:
  easb_postgres_data:

networks:
  easb-net:
    external: true
